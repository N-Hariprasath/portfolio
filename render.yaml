services:
  # Database Service (Private Service - only accessible within Render)
  - type: psvc
    name: portfolio-db-n-hariprasath
    runtime: docker
    dockerContext: database
    dockerfilePath: Dockerfile
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: root
      - key: MYSQL_DATABASE
        value: portfolio_db

  # Backend Web Service
  - type: web
    name: portfolio-backend-n-hariprasath
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DB_HOST
        value: portfolio-db-n-hariprasath
      - key: DB_PORT
        value: "3306"
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://portfolio-db-n-hariprasath:3306/portfolio_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        value: root
      - key: CORS_ALLOWED_ORIGINS
        value: https://portfolio-frontend-n-hariprasath.onrender.com

  # Frontend Static Site
  - type: web
    name: portfolio-frontend-n-hariprasath
    runtime: static
    staticPublishPath: frontend
